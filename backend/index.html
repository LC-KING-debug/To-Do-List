<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-do List</title>
    
    <link rel="icon" type="image/jpeg" href="/assets/imgs/favicon.jpg">
    
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <nav>
        <button id="btnInicio" class="active"> Início</button>
        <button id="btnHistorico"> Histórico</button>
    </nav>
    
    <header>
        <h1>Minha To-do List</h1>
        <div id="relogio" class="relogio"></div>
    </header>

    <main>
        <div id="abaInicio">
            <p id="textoFrase" class="frase-texto-pura" onclick="atualizarFrase()" title="Clique para mudar a frase">
                <i>Buscando uma frase inspiradora...</i>
            </p>

            <input type="text" id="tarefaInput" placeholder="Digite sua tarefa">
            
            <div class="botoes">
                <button onclick="adicionarTarefa()">Adicionar tarefa</button>
                <button id="btnConcluirTodas" onclick="concluirTodas()">Concluir Todas</button>
                <button id="btnExcluirTudo" onclick="excluirTudo()">Excluir Tudo</button>
            </div>

            <ul id="listaTarefas"></ul>
        </div>

        <div id="abaHistorico" style="display: none;">
            <h2>Histórico de Tarefas Excluídas</h2>
            <button onclick="limparHistorico()" class="btn-danger">🗑️ Limpar Histórico</button>
            <ul id="listaHistorico"></ul>
        </div>
    </main>

    <footer>
        <p>Lista de tarefa made by LUCIUS</p>
        <a href="https://github.com/LC-KING-debug" target="_blank">GitHub</a>
        <a href="https://www.linkedin.com/in/luciuskether/" target="_blank">LinkedIn</a>
    </footer>

    <script src="/APIS/apifrases.js" defer></script>
    <script src="/js/script.js" defer></script>
</body>
</html>
